spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/workhub
    username: workhub_user
    password: workhub_pass
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,readiness,liveness
  endpoint:
    health:
      show-details: always

jwt:
  secret: workhub-super-secret-key-must-be-at-least-256-bits-long-here
  expiration: 86400000