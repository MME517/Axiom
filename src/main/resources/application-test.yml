spring:
  datasource:
    url: jdbc:h2:mem:testdb;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect
    show-sql: false
    open-in-view: false
  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST:localhost}
    port: ${SPRING_RABBITMQ_PORT:5672}
    username: ${SPRING_RABBITMQ_USERNAME:guest}
    password: ${SPRING_RABBITMQ_PASSWORD:guest}
    listener:
      simple:
        retry:
          enabled: true
          initial-interval: 2000ms
          max-attempts: 3
          multiplier: 2.0
          max-interval: 10000ms
        default-requeue-rejected: false
        missing-queues-fatal: false

jwt:
  secret: test-secret-key-must-be-at-least-256-bits-long-here-ok
  expiration: 86400000

workhub:
  rabbitmq:
    report-queue: report.generate
    report-exchange: workhub.reports
    report-routing-key: report.generate
    dlq-name: report.generate.dlq
    dlx-name: workhub.reports.dlx