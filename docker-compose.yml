version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: workhub-postgres
    environment:
      POSTGRES_DB: workhub
      POSTGRES_USER: workhub_user
      POSTGRES_PASSWORD: workhub_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    container_name: workhub-app
    ports:
      - "9090:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/workhub
      SPRING_DATASOURCE_USERNAME: workhub_user
      SPRING_DATASOURCE_PASSWORD: workhub_pass
    depends_on:
      - postgres

volumes:
  postgres_data: